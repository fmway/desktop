name: "CI"
on:
  pull_request:
  push:
    branches:
      - nixos-unstable
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  setup-git: |
    git config --global user.name 'fmway_bot'
    git config --global user.email 'fm18lv@gmail.com'
    git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY
  read-nix-conf: |
    {
      echo 'CONF<<EOF'
      cat nix.conf
      echo 'EOF'
      rm nix.conf
    } >> "$GITHUB_OUTPUT"
permissions: write-all
jobs:
  generate-nixconf:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: wimpysworld/nothing-but-nix@main
    - uses: DeterminateSystems/nix-installer-action@main
      with:
        github-token: ${{ secrets.GH_TOKEN }}
        extra-conf: |
          experimental-features = nix-command flakes pipe-operators
    - run: nix run .#gcn > nix.conf
    - uses: actions/upload-artifact@v4
      with:
        name: nix-conf
        path: nix.conf
  nixos:
    runs-on: ubuntu-latest
    needs:
    - generate-nixconf
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    - uses: wimpysworld/nothing-but-nix@main
      with:
        hatchet-protocol: 'rampage'
        root-safe-haven: '3072'   # Reserve 3GB on the / filesystem
        mnt-safe-haven: '2048'    # Reserve 2GB on the /mnt filesystem
    - name: "Check current branch"
      run: git branch
    - uses: actions/download-artifact@v4
      with:
        name: nix-conf
    - name: Read nix.conf
      id: nix
      run: ${{ env.read-nix-conf }}
    - uses: DeterminateSystems/nix-installer-action@main
      with:
        github-token: ${{ secrets.GH_TOKEN }}
        extra-conf: |
          ${{ steps.nix.outputs.CONF }}
    - name: Build
      run: nix run nixpkgs#nixos-rebuild -- build --flake .#default --show-trace
    - name: Info
      run: nix path-info -Sh ./result 

  build-readme:
    if: ${{ github.event_name != 'pull_request' && contains(github.event.head_commit.message, 'lockfile') }}
    runs-on: ubuntu-latest
    needs: [ generate-nixconf ]
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
    - name: Setup git
      run: ${{ env.setup-git }}
    - uses: wimpysworld/nothing-but-nix@main
    - uses: actions/download-artifact@v4
      with:
        name: nix-conf
    - name: Read nix.conf
      id: nix
      run: ${{ env.read-nix-conf }}
    - uses: DeterminateSystems/nix-installer-action@main
      with:
        github-token: ${{ secrets.GH_TOKEN }}
        extra-conf: |
          ${{ steps.nix.outputs.CONF }}
    - uses: cachix/cachix-action@master
      with:
        name: fmcachix
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        skipAddingSubstituter: true
    - name: build
      run: |
        TM=$(mktemp)
        nix run .#readme >> $TM
        cat $TM > README.md
        rm -f nix.conf
    - name: Check Updates
      id: check
      env:
        GITHUB_TOKEN: ${{secrets.GH_TOKEN}}
      run: |
        if [ -n "$(git status --short)" ]; then
          git add -A
          git commit -m "chore: Updated Readme"
          git checkout -B readme
          git push origin readme --force
          if [ -z "$(git diff origin/readme origin/nixos-unstable)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        fi
    - name: Pull Request
      if: '!steps.check.outputs.skip'
      env:
        GITHUB_TOKEN: ${{secrets.GH_TOKEN}}
      run: |
        gh pr create --title "chore: Updated readme" --body "" -l "automated" -l "documentation" --head readme --base nixos-unstable || echo create pr failed successfully

